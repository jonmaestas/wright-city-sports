<!DOCTYPE html>
<html lang="en">

<head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Prop G Filter Studio</title>
        <style>
                body {
                        font-family: 'Poppins', sans-serif;
                        margin: 0;
                        padding: 10px;
                        background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
                        color: #333;
                        overflow-x: hidden;
                }

                h1 {
                        text-align: center;
                        font-size: 2.5em;
                        margin-bottom: 20px;
                        color: #2c3e50;
                        animation: fadeIn 1s ease-in;
                }

                .container {
                        width: 100%;
                        max-width: 1000px;
                        margin: 0 auto;
                        padding: 15px;
                        background: rgba(255, 255, 255, 0.9);
                        border-radius: 15px;
                        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
                        box-sizing: border-box;
                }

                .upload-area {
                        border: 3px dashed #3498db;
                        padding: 20px;
                        text-align: center;
                        border-radius: 10px;
                        margin-bottom: 20px;
                        transition: all 0.3s ease;
                        cursor: pointer;
                }

                .upload-area.dragover {
                        background: #ecf0f1;
                        border-color: #2ecc71;
                }

                .upload-area input {
                        display: none;
                }

                .upload-area label {
                        font-size: 1.2em;
                        color: #3498db;
                        cursor: pointer;
                        display: block;
                        padding: 10px;
                }

                /* Improved filter carousel */
                .filter-carousel {
                        display: flex;
                        flex-wrap: nowrap;
                        overflow-x: auto;
                        gap: 8px;
                        padding: 10px 0;
                        margin-bottom: 20px;
                        scroll-behavior: smooth;
                        -webkit-overflow-scrolling: touch;
                        /* For smoother scrolling on iOS */
                        scrollbar-width: thin;
                }

                .filter-carousel::-webkit-scrollbar {
                        height: 6px;
                }

                .filter-carousel::-webkit-scrollbar-thumb {
                        background: #3498db;
                        border-radius: 6px;
                }

                .filter-item {
                        flex: 0 0 auto;
                        width: 80px;
                        height: 110px;
                        display: flex;
                        flex-direction: column;
                        align-items: center;
                        text-align: center;
                        font-size: 0.85em;
                        font-weight: 600;
                        color: #2c3e50;
                        background: #fff;
                        border-radius: 10px;
                        overflow: hidden;
                        cursor: pointer;
                        transition: transform 0.3s ease, box-shadow 0.3s ease;
                        padding-bottom: 5px;
                }

                .filter-item:hover,
                .filter-item.active {
                        transform: scale(1.05);
                        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
                }

                .filter-thumb {
                        width: 80px;
                        height: 80px;
                        background: #fff;
                        border-radius: 10px 10px 0 0;
                        overflow: hidden;
                        cursor: pointer;
                        transition: transform 0.3s ease, box-shadow 0.3s ease;
                }

                .filter-thumb img {
                        width: 100%;
                        height: 100%;
                        object-fit: cover;
                }

                canvas {
                        display: block;
                        width: 100%;
                        max-width: 100%;
                        border-radius: 10px;
                        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
                        margin: 0 auto;
                        touch-action: manipulation;
                        /* Improved touch handling */
                }

                .controls {
                        display: flex;
                        gap: 15px;
                        justify-content: center;
                        flex-wrap: wrap;
                        margin-top: 20px;
                }

                button {
                        padding: 12px 20px;
                        font-size: 1.1em;
                        border: none;
                        border-radius: 25px;
                        background: #2ecc71;
                        color: white;
                        cursor: pointer;
                        transition: all 0.3s ease;
                        min-width: 120px;
                        -webkit-tap-highlight-color: transparent;
                        /* Remove tap highlight on mobile */
                }

                button:hover {
                        background: #27ae60;
                        transform: translateY(-2px);
                }

                /* Add instructions for mobile users */
                .mobile-instructions {
                        display: none;
                        padding: 10px;
                        margin: 10px 0;
                        background: #f8f9fa;
                        border-radius: 8px;
                        font-size: 0.9em;
                        text-align: center;
                }

                /* Enhanced mobile-specific styles */
                @media (max-width: 600px) {
                        body {
                                padding: 5px;
                        }

                        h1 {
                                font-size: 1.6em;
                                margin-bottom: 15px;
                        }

                        .container {
                                padding: 10px;
                                border-radius: 10px;
                        }

                        .upload-area {
                                padding: 15px;
                        }

                        .upload-area label {
                                font-size: 1em;
                        }

                        .mobile-instructions {
                                display: block;
                        }

                        .filter-item {
                                width: 70px;
                                height: 100px;
                                font-size: 0.75em;
                        }

                        .filter-thumb {
                                width: 70px;
                                height: 70px;
                        }

                        .controls {
                                gap: 10px;
                        }

                        button {
                                padding: 10px 15px;
                                font-size: 1em;
                                width: 100%;
                                max-width: 200px;
                        }
                }

                @keyframes fadeIn {
                        from {
                                opacity: 0;
                        }

                        to {
                                opacity: 1;
                        }
                }
        </style>
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet" />
</head>

<body>
        <div class="container">
                <h1>Prop G Filter Studio</h1>

                <div class="upload-area" id="uploadArea">
                        <label for="imageInput">Drop or Click to Upload Your Photo</label>
                        <!-- <input type="file" id="imageInput" accept="image/*" capture="environment" /> -->
                        <!--Remove the capture="environment" attribute from the input tag. It forces the camera to open directly on mobile. Without it, the default behavior (choosing between camera or album) will occur.-->
                        <input type="file" id="imageInput" accept="image/*" />
                </div>

                <div class="mobile-instructions">
                        <p>📱 Pinch to zoom and drag to position your photo. Swipe to browse filters.</p>
                </div>

                <div class="filter-carousel" id="filterCarousel">
                        <div class="filter-item" data-filter="filters/2.png">
                                <div class="filter-thumb">
                                        <img src="filters/2.png" alt="Filter 2">
                                </div>
                                <span>WC Proud</span>
                        </div>
                        <div class="filter-item" data-filter="filters/3.png">
                                <div class="filter-thumb">
                                        <img src="filters/3.png" alt="Filter 3">
                                </div>
                                <span>WC Proud</span>
                        </div>
                        <div class="filter-item" data-filter="filters/18.png">
                                <div class="filter-thumb">
                                        <img src="filters/18.png" alt="Filter 18">
                                </div>
                                <span>Future Wildcat</span>
                        </div>
                        <!-- Early Childhood -->
                        <div class="filter-item" data-filter="filters/17.png">
                                <div class="filter-thumb">
                                        <img src="filters/17.png" alt="Filter 17">
                                </div>
                                <span>Pre-K</span>
                        </div>
                        <div class="filter-item" data-filter="filters/16.png">
                                <div class="filter-thumb">
                                        <img src="filters/16.png" alt="Filter 16">
                                </div>
                                <span>Kindergarten</span>
                        </div>
                        <!-- Elementary -->
                        <div class="filter-item" data-filter="filters/15.png">
                                <div class="filter-thumb">
                                        <img src="filters/15.png" alt="Filter 15">
                                </div>
                                <span>1st Grade</span>
                        </div>
                        <div class="filter-item" data-filter="filters/14.png">
                                <div class="filter-thumb">
                                        <img src="filters/14.png" alt="Filter 14">
                                </div>
                                <span>2nd Grade</span>
                        </div>
                        <div class="filter-item" data-filter="filters/13.png">
                                <div class="filter-thumb">
                                        <img src="filters/13.png" alt="Filter 13">
                                </div>
                                <span>3rd Grade</span>
                        </div>
                        <div class="filter-item" data-filter="filters/12.png">
                                <div class="filter-thumb">
                                        <img src="filters/12.png" alt="Filter 12">
                                </div>
                                <span>4th Grade</span>
                        </div>
                        <div class="filter-item" data-filter="filters/11.png">
                                <div class="filter-thumb">
                                        <img src="filters/11.png" alt="Filter 11">
                                </div>
                                <span>5th Grade</span>
                        </div>
                        <!-- Middle School -->
                        <div class="filter-item" data-filter="filters/10.png">
                                <div class="filter-thumb">
                                        <img src="filters/10.png" alt="Filter 10">
                                </div>
                                <span>6th Grade</span>
                        </div>
                        <div class="filter-item" data-filter="filters/9.png">
                                <div class="filter-thumb">
                                        <img src="filters/9.png" alt="Filter 9">
                                </div>
                                <span>7th Grade</span>
                        </div>
                        <div class="filter-item" data-filter="filters/8.png">
                                <div class="filter-thumb">
                                        <img src="filters/8.png" alt="Filter 8">
                                </div>
                                <span>8th Grade</span>
                        </div>
                        <!-- High School -->
                        <div class="filter-item" data-filter="filters/7.png">
                                <div class="filter-thumb">
                                        <img src="filters/7.png" alt="Filter 7">
                                </div>
                                <span>Freshman</span>
                        </div>
                        <div class="filter-item" data-filter="filters/6.png">
                                <div class="filter-thumb">
                                        <img src="filters/6.png" alt="Filter 6">
                                </div>
                                <span>Sophomore</span>
                        </div>
                        <div class="filter-item" data-filter="filters/5.png">
                                <div class="filter-thumb">
                                        <img src="filters/5.png" alt="Filter 5">
                                </div>
                                <span>Junior</span>
                        </div>
                        <div class="filter-item" data-filter="filters/4.png">
                                <div class="filter-thumb">
                                        <img src="filters/4.png" alt="Filter 4">
                                </div>
                                <span>Senior</span>
                        </div>
                        <!-- Post-Graduation / Spirit -->
                        <div class="filter-item" data-filter="filters/19.png">
                                <div class="filter-thumb">
                                        <img src="filters/19.png" alt="Filter 19">
                                </div>
                                <span>Alumni</span>
                        </div>
                </div>

                <canvas id="canvas"></canvas>
                <div class="controls">
                        <button id="resetBtn">Reset Position</button>
                        <button id="downloadBtn">Download</button>
                </div>
        </div>

        <script>
                const imageInput = document.getElementById('imageInput');
                const uploadArea = document.getElementById('uploadArea');
                const filterCarousel = document.getElementById('filterCarousel');
                const downloadBtn = document.getElementById('downloadBtn');
                const resetBtn = document.getElementById('resetBtn');
                const canvas = document.getElementById('canvas');
                const ctx = canvas.getContext('2d');

                let baseImg, filterImg;
                let imgX = 0,
                        imgY = 0;
                let imgWidth, imgHeight;
                let scale = 1;
                let isDragging = false;
                let startX, startY;
                let initialImgX, initialImgY, initialScale;

                // Upload handling (click or drag-and-drop)
                uploadArea.addEventListener('click', () => imageInput.click());
                imageInput.addEventListener('change', handleImageUpload);
                uploadArea.addEventListener('dragover', (e) => {
                        e.preventDefault();
                        uploadArea.classList.add('dragover');
                });
                uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
                uploadArea.addEventListener('drop', (e) => {
                        e.preventDefault();
                        uploadArea.classList.remove('dragover');
                        const file = e.dataTransfer.files[0];
                        if (file) handleImageUpload({ target: { files: [file] } });
                });

                async function handleImageUpload(e) {
                        if (e.target.files && e.target.files[0]) {
                                baseImg = await loadImage(URL.createObjectURL(e.target.files[0]));

                                // Set canvas dimensions based on screen size
                                setCanvasDimensions();

                                // Calculate initial image position and scale
                                resetImagePosition();

                                // Store initial position for reset functionality
                                initialImgX = imgX;
                                initialImgY = imgY;
                                initialScale = scale;

                                drawCanvas();
                        }
                }

                function setCanvasDimensions() {
                        const maxWidth = Math.min(window.innerWidth - 40, 800);
                        const maxHeight = window.innerHeight * 0.6;

                        // Maintain aspect ratio
                        if (baseImg.width / baseImg.height > maxWidth / maxHeight) {
                                canvas.width = maxWidth;
                                canvas.height = maxWidth * (baseImg.height / baseImg.width);
                        } else {
                                canvas.height = maxHeight;
                                canvas.width = maxHeight * (baseImg.width / baseImg.height);
                        }
                }

                function resetImagePosition() {
                        // Calculate scale to fit image properly in canvas
                        const widthRatio = canvas.width / baseImg.width;
                        const heightRatio = canvas.height / baseImg.height;
                        scale = Math.min(widthRatio, heightRatio) * 0.9; // 90% of fitting size

                        imgWidth = baseImg.width;
                        imgHeight = baseImg.height;

                        // Center the image
                        imgX = (canvas.width - imgWidth * scale) / 2;
                        imgY = (canvas.height - imgHeight * scale) / 2;
                }

                // Filter selection
                filterCarousel.addEventListener('click', async (e) => {
                        const filterItem = e.target.closest('.filter-item');
                        if (filterItem) {
                                document.querySelectorAll('.filter-item').forEach(item => item.classList.remove('active'));
                                filterItem.classList.add('active');
                                filterImg = await loadImage(filterItem.dataset.filter);
                                drawCanvas();
                        }
                });

                // Download
                downloadBtn.addEventListener('click', () => {
                        if (!baseImg) {
                                alert("Please upload an image first");
                                return;
                        }
                        const link = document.createElement('a');
                        link.download = 'prop-g-support.png';
                        link.href = canvas.toDataURL('image/png');
                        link.click();
                });

                // Reset position button
                resetBtn.addEventListener('click', () => {
                        if (baseImg) {
                                resetImagePosition();
                                drawCanvas();
                        }
                });

                // Desktop mouse events
                canvas.addEventListener('mousedown', startDragging);
                canvas.addEventListener('mousemove', drag);
                canvas.addEventListener('mouseup', stopDragging);
                canvas.addEventListener('mouseleave', stopDragging);
                canvas.addEventListener('wheel', zoom);

                // Mobile touch events
                canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
                canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
                canvas.addEventListener('touchend', stopDragging);

                function startDragging(e) {
                        if (!baseImg) return;

                        const rect = canvas.getBoundingClientRect();
                        const mouseX = e.clientX - rect.left;
                        const mouseY = e.clientY - rect.top;

                        isDragging = true;
                        startX = mouseX;
                        startY = mouseY;
                }

                function drag(e) {
                        if (isDragging && baseImg) {
                                const rect = canvas.getBoundingClientRect();
                                const mouseX = e.clientX - rect.left;
                                const mouseY = e.clientY - rect.top;
                                const dx = mouseX - startX;
                                const dy = mouseY - startY;
                                imgX += dx;
                                imgY += dy;
                                startX = mouseX;
                                startY = mouseY;
                                drawCanvas();
                        }
                }

                function stopDragging() {
                        isDragging = false;
                }

                function zoom(e) {
                        if (!baseImg) return;

                        e.preventDefault();
                        const zoomFactor = 0.1;
                        const rect = canvas.getBoundingClientRect();
                        const mouseX = e.clientX - rect.left;
                        const mouseY = e.clientY - rect.top;

                        const oldScale = scale;
                        scale += e.deltaY < 0 ? zoomFactor : -zoomFactor;
                        scale = Math.max(0.1, Math.min(scale, 5));
                        imgX = mouseX - (mouseX - imgX) * (scale / oldScale);
                        imgY = mouseY - (mouseY - imgY) * (scale / oldScale);
                        drawCanvas();
                }

                // Touch handling for mobile with improved pinch-to-zoom
                let lastTouchDistance = 0;
                function handleTouchStart(e) {
                        if (!baseImg) return;

                        e.preventDefault();
                        if (e.touches.length === 1) {
                                const rect = canvas.getBoundingClientRect();
                                startX = e.touches[0].clientX - rect.left;
                                startY = e.touches[0].clientY - rect.top;
                                isDragging = true;
                        } else if (e.touches.length === 2) {
                                isDragging = false;
                                lastTouchDistance = getTouchDistance(e.touches);
                        }
                }

                function handleTouchMove(e) {
                        if (!baseImg) return;

                        e.preventDefault();
                        const rect = canvas.getBoundingClientRect();
                        if (e.touches.length === 1 && isDragging) {
                                const mouseX = e.touches[0].clientX - rect.left;
                                const mouseY = e.touches[0].clientY - rect.top;
                                const dx = mouseX - startX;
                                const dy = mouseY - startY;
                                imgX += dx;
                                imgY += dy;
                                startX = mouseX;
                                startY = mouseY;
                                drawCanvas();
                        } else if (e.touches.length === 2) {
                                const newDistance = getTouchDistance(e.touches);
                                const scaleChange = (newDistance - lastTouchDistance) * 0.01;
                                const oldScale = scale;
                                scale = Math.max(0.1, Math.min(scale + scaleChange, 5));
                                const centerX = (e.touches[0].clientX + e.touches[1].clientX) / 2 - rect.left;
                                const centerY = (e.touches[0].clientY + e.touches[1].clientY) / 2 - rect.top;
                                imgX = centerX - (centerX - imgX) * (scale / oldScale);
                                imgY = centerY - (centerY - imgY) * (scale / oldScale);
                                lastTouchDistance = newDistance;
                                drawCanvas();
                        }
                }

                function getTouchDistance(touches) {
                        const dx = touches[0].clientX - touches[1].clientX;
                        const dy = touches[0].clientY - touches[1].clientY;
                        return Math.sqrt(dx * dx + dy * dy);
                }

                // Draw the canvas
                function drawCanvas() {
                        ctx.clearRect(0, 0, canvas.width, canvas.height);
                        if (baseImg) {
                                ctx.drawImage(baseImg, imgX, imgY, imgWidth * scale, imgHeight * scale);
                        }
                        if (filterImg) {
                                ctx.drawImage(filterImg, 0, 0, canvas.width, canvas.height);
                        }
                }

                // Load image helper
                function loadImage(src) {
                        return new Promise((resolve, reject) => {
                                const img = new Image();
                                img.onload = () => resolve(img);
                                img.onerror = () => reject(new Error(`Failed to load image: ${src}`));
                                img.src = src;
                        });
                }

                // Handle window resize
                window.addEventListener('resize', () => {
                        if (baseImg) {
                                setCanvasDimensions();
                                resetImagePosition();
                                drawCanvas();
                        }
                });
        </script>
</body>

</html>
