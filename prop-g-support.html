<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prop G Filter Studio</title>
    <style>
        body { margin: 0; padding: 10px; }
        .container { max-width: 100%; padding: 10px; }
        .upload-area { border: 2px dashed #000; padding: 20px; text-align: center; cursor: pointer; }
        .upload-area input { display: none; }
        .filter-carousel { display: flex; overflow-x: auto; gap: 10px; padding: 10px 0; }
        .filter-item { width: 80px; text-align: center; cursor: pointer; }
        .filter-thumb img { width: 80px; height: 80px; object-fit: cover; }
        canvas { display: block; width: 100%; max-width: 800px; margin: 0 auto; }
        .controls { margin-top: 10px; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <div class="upload-area" id="uploadArea">
            <label for="imageInput">Upload Photo</label>
            <input type="file" id="imageInput" accept="image/*">
        </div>
        <div class="filter-carousel" id="filterCarousel">
            <div class="filter-item" data-filter="filters/2.png"><div class="filter-thumb"><img src="filters/2.png" alt="Filter 2"></div><span>WC Proud</span></div>
            <div class="filter-item" data-filter="filters/3.png"><div class="filter-thumb"><img src="filters/3.png" alt="Filter 3"></div><span>WC Proud</span></div>
            <div class="filter-item" data-filter="filters/18.png"><div class="filter-thumb"><img src="filters/18.png" alt="Filter 18"></div><span>Future Wildcat</span></div>
            <div class="filter-item" data-filter="filters/17.png"><div class="filter-thumb"><img src="filters/17.png" alt="Filter 17"></div><span>Pre-K</span></div>
            <div class="filter-item" data-filter="filters/16.png"><div class="filter-thumb"><img src="filters/16.png" alt="Filter 16"></div><span>Kindergarten</span></div>
            <div class="filter-item" data-filter="filters/15.png"><div class="filter-thumb"><img src="filters/15.png" alt="Filter 15"></div><span>1st Grade</span></div>
            <div class="filter-item" data-filter="filters/14.png"><div class="filter-thumb"><img src="filters/14.png" alt="Filter 14"></div><span>2nd Grade</span></div>
            <div class="filter-item" data-filter="filters/13.png"><div class="filter-thumb"><img src="filters/13.png" alt="Filter 13"></div><span>3rd Grade</span></div>
            <div class="filter-item" data-filter="filters/12.png"><div class="filter-thumb"><img src="filters/12.png" alt="Filter 12"></div><span>4th Grade</span></div>
            <div class="filter-item" data-filter="filters/11.png"><div class="filter-thumb"><img src="filters/11.png" alt="Filter 11"></div><span>5th Grade</span></div>
            <div class="filter-item" data-filter="filters/10.png"><div class="filter-thumb"><img src="filters/10.png" alt="Filter 10"></div><span>6th Grade</span></div>
            <div class="filter-item" data-filter="filters/9.png"><div class="filter-thumb"><img src="filters/9.png" alt="Filter 9"></div><span>7th Grade</span></div>
            <div class="filter-item" data-filter="filters/8.png"><div class="filter-thumb"><img src="filters/8.png" alt="Filter 8"></div><span>8th Grade</span></div>
            <div class="filter-item" data-filter="filters/7.png"><div class="filter-thumb"><img src="filters/7.png" alt="Filter 7"></div><span>Freshman</span></div>
            <div class="filter-item" data-filter="filters/6.png"><div class="filter-thumb"><img src="filters/6.png" alt="Filter 6"></div><span>Sophomore</span></div>
            <div class="filter-item" data-filter="filters/5.png"><div class="filter-thumb"><img src="filters/5.png" alt="Filter 5"></div><span>Junior</span></div>
            <div class="filter-item" data-filter="filters/4.png"><div class="filter-thumb"><img src="filters/4.png" alt="Filter 4"></div><span>Senior</span></div>
            <div class="filter-item" data-filter="filters/19.png"><div class="filter-thumb"><img src="filters/19.png" alt="Filter 19"></div><span>Alumni</span></div>
        </div>
        <canvas id="canvas"></canvas>
        <div class="controls">
            <button id="resetBtn">Reset</button>
            <button id="downloadBtn">Download</button>
        </div>
    </div>

    <script>
        const imageInput = document.getElementById('imageInput');
        const uploadArea = document.getElementById('uploadArea');
        const filterCarousel = document.getElementById('filterCarousel');
        const downloadBtn = document.getElementById('downloadBtn');
        const resetBtn = document.getElementById('resetBtn');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let baseImg, filterImg, imgX = 0, imgY = 0, imgWidth, imgHeight, scale = 1, isDragging = false, startX, startY;

        function loadImage(src) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.onload = () => resolve(img);
                img.onerror = () => reject(new Error(`Failed to load: ${src}`));
                img.src = src;
            });
        }

        uploadArea.addEventListener('click', () => imageInput.click());
        imageInput.addEventListener('change', async (e) => {
            if (e.target.files[0]) {
                baseImg = await loadImage(URL.createObjectURL(e.target.files[0]));
                setCanvasDimensions();
                resetImagePosition();
                drawCanvas();
            }
        });

        filterCarousel.addEventListener('click', async (e) => {
            const filterItem = e.target.closest('.filter-item');
            if (filterItem) {
                filterImg = await loadImage(filterItem.dataset.filter);
                drawCanvas();
            }
        });

        downloadBtn.addEventListener('click', () => {
            if (baseImg) {
                const link = document.createElement('a');
                link.download = 'filtered-image.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            }
        });

        resetBtn.addEventListener('click', () => {
            if (baseImg) {
                resetImagePosition();
                drawCanvas();
            }
        });

        canvas.addEventListener('mousedown', startDragging);
        canvas.addEventListener('mousemove', drag);
        canvas.addEventListener('mouseup', stopDragging);
        canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
        canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
        canvas.addEventListener('touchend', stopDragging);
        canvas.addEventListener('wheel', zoom);

        function setCanvasDimensions() {
            const maxWidth = Math.min(window.innerWidth - 40, 800);
            const maxHeight = window.innerHeight * 0.6;
            canvas.width = baseImg.width > baseImg.height ? maxWidth : maxHeight * (baseImg.width / baseImg.height);
            canvas.height = baseImg.width > baseImg.height ? maxWidth * (baseImg.height / baseImg.width) : maxHeight;
        }

        function resetImagePosition() {
            scale = Math.min(canvas.width / baseImg.width, canvas.height / baseImg.height) * 0.9;
            imgWidth = baseImg.width;
            imgHeight = baseImg.height;
            imgX = (canvas.width - imgWidth * scale) / 2;
            imgY = (canvas.height - imgHeight * scale) / 2;
        }

        function drawCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (baseImg) ctx.drawImage(baseImg, imgX, imgY, imgWidth * scale, imgHeight * scale);
            if (filterImg) ctx.drawImage(filterImg, 0, 0, canvas.width, canvas.height);
        }

        function startDragging(e) {
            if (!baseImg) return;
            const rect = canvas.getBoundingClientRect();
            startX = e.clientX - rect.left;
            startY = e.clientY - rect.top;
            isDragging = true;
        }

        function drag(e) {
            if (isDragging && baseImg) {
                const rect = canvas.getBoundingClientRect();
                const mouseX = e.clientX - rect.left;
                const mouseY = e.clientY - rect.top;
                imgX += mouseX - startX;
                imgY += mouseY - startY;
                startX = mouseX;
                startY = mouseY;
                drawCanvas();
            }
        }

        function stopDragging() {
            isDragging = false;
        }

        function zoom(e) {
            if (!baseImg) return;
            e.preventDefault();
            const zoomFactor = 0.1;
            scale += e.deltaY < 0 ? zoomFactor : -zoomFactor;
            scale = Math.max(0.1, Math.min(scale, 5));
            drawCanvas();
        }

        function handleTouchStart(e) {
            if (!baseImg) return;
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            startX = e.touches[0].clientX - rect.left;
            startY = e.touches[0].clientY - rect.top;
            isDragging = true;
        }

        function handleTouchMove(e) {
            if (!baseImg || !isDragging) return;
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.touches[0].clientX - rect.left;
            const mouseY = e.touches[0].clientY - rect.top;
            imgX += mouseX - startX;
            imgY += mouseY - startY;
            startX = mouseX;
            startY = mouseY;
            drawCanvas();
        }

        window.addEventListener('resize', () => {
            if (baseImg) {
                setCanvasDimensions();
                resetImagePosition();
                drawCanvas();
            }
        });
    </script>
</body>
</html>
