<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Opening mail…</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script>
    window.onload = function() {
      // Open mail client
      window.location.replace(
        "mailto:mayor@wrightcity.org"
        + "?cc=play@wrightcitysports.org"
        + "&subject=" + encodeURIComponent("Support for TSM Running Wright City Sports Programs")
        + "&body=" + encodeURIComponent(
          "Dear Mayor Heiliger and Board of Aldermen,\n\n" +
          "Yes, I support Tournament Sports Management (TSM) running our sports programs. " +
          "I believe this will benefit the community and keep youth sports strong in Wright City.\n\n" +
          "Thank you,\n[Your Name]"
        )
      );

      // After 3s, replace history and go to thank-you page
      setTimeout(() => {
        window.location.replace("/thankyou");
      }, 3000);
    };
  </script>
</head>
<body></body>
</html>
